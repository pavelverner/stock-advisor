name: Stock Advisor – monitoring signálů

on:
  schedule:
    # Každou hodinu v 8–21 UTC (= 10–23 CEST, 9–22 CET) v pracovní dny
    - cron: "0 8-21 * * 1-5"
  workflow_dispatch:   # ruční spuštění tlačítkem na GitHubu

jobs:
  check-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalace závislostí
        run: pip install yfinance pandas numpy requests

      - name: Kontrola signálů a odeslání emailu
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ vars.EMAIL_TO || secrets.EMAIL_TO }}
        run: python check_and_notify.py
